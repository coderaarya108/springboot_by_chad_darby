spring.application.name=hibernate-crud-demo

spring.datasource.url=jdbc:mysql://localhost:3306/student_tracker

# @sonarqube , this is just for educational purposes, not for production use, so we can hardcode the username and password here
spring.datasource.username=springstudent
spring.datasource.password=springstudent

# You can actually turn off the spring boot banner via this property
spring.main.banner-mode=off

# Also we can lower the logging levels to only show warnings and errors, so we can focus on the important stuff
logging.level.root=WARN

# Logging SQL statements and their parameters, this is super useful for debugging and learning how Hibernate works under the hood
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

#
# ### DO NO SET THIS IN PRODUCTION ENVIRONMENT, THIS IS JUST FOR LEARNING PURPOSES ###
#
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.ddl-auto=update
